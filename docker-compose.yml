version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maintainpro_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: maintainpro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: maintainpro
      POSTGRES_PASSWORD: maintainpro_dev
      POSTGRES_DB: maintainpro
    ports:
      # Expose only on localhost — do not bind to 0.0.0.0 in dev
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintainpro -d maintainpro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — optional, comment out if not needed
  # Access at http://localhost:5050  (admin@maintainpro.local / admin)
  # ---------------------------------------------------------------------------
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: maintainpro_pgadmin
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@maintainpro.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #     PGADMIN_CONFIG_SERVER_MODE: "False"
  #   ports:
  #     - "127.0.0.1:5050:80"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  # pgadmin_data:
  #   driver: local
